<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soundcode - Interactive Scanner</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0b0b0f; --bg-container: #16161d; --bg-section: #1f1f29; --bg-input: #0a0a0e;
            --text-main: #e0e0e0; --text-title: #ffffff; --text-muted: #888888; --border-color: #2d2d3d;
            --btn-bg: #FF9500; --btn-text: #000000; --btn-hover: #e68600;
            --laser-color: #FF9500; --highlight-glow: rgba(255, 149, 0, 0.2);
        }

        body.light-mode {
            --bg-main: #f0f2f5; --bg-container: #ffffff; --bg-section: #f8f9fa; --bg-input: #ffffff;
            --text-main: #333333; --text-title: #1a1a1a; --text-muted: #666666; --border-color: #e4e6eb;
            --btn-text: #ffffff; 
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-main); color: var(--text-main); text-align: center; 
            padding: 10px; margin: 0; transition: background-color 0.4s;
            -webkit-font-smoothing: antialiased; line-height: 1.6;
        }

        .container { max-width: 600px; margin: 20px auto; background: var(--bg-container); padding: 25px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); position: relative; }

        .app-header { position: relative; display: flex; align-items: center; justify-content: center; padding: 10px 0 30px 0; min-height: 50px; }
        h1 { margin: 0; color: var(--text-title); letter-spacing: 4px; text-transform: uppercase; font-size: 22px; font-weight: 800; width: 100%; }
        
        .theme-btn {
            position: absolute; right: 0; background: var(--bg-section); color: var(--text-title);
            border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 12px;
            font-size: 10px; cursor: pointer; font-weight: 700; text-transform: uppercase; z-index: 10;
        }

        .section { margin-bottom: 30px; padding: 20px; background: var(--bg-section); border-radius: 18px; border: 1px solid var(--border-color); }
        h2 { font-size: 12px; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 20px; font-weight: 600; }
        
        input[type="text"] { 
            width: 90%; padding: 14px; background: var(--bg-input); border: 2px solid var(--btn-bg); 
            color: var(--text-main); font-size: 15px; border-radius: 12px; margin-bottom: 15px; 
            box-shadow: 0 0 10px var(--highlight-glow); outline: none; font-family: inherit;
        }
        
        .btn-primary { 
            background: var(--btn-bg); color: var(--btn-text); border: none; padding: 14px 28px; 
            font-size: 14px; font-weight: 800; text-transform: uppercase; cursor: pointer; 
            border-radius: 10px; margin: 5px; transition: 0.2s; box-shadow: 0 5px 15px var(--highlight-glow);
            font-family: inherit;
        }

        #encodeCanvas { background: var(--bg-main); margin-top: 20px; border-radius: 12px; max-width: 100%; display: none; }
        .drop-zone { width: 85%; margin: 10px auto; padding: 40px 10px; border: 2px dashed var(--btn-bg); border-radius: 15px; background: rgba(255, 149, 0, 0.05); color: var(--text-title); font-weight: 700; cursor: pointer; font-size: 12px; text-transform: uppercase; }

        .scanner-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: none; z-index: 9999; background: #000; }
        .scanner-container video { width: 100%; height: 100%; object-fit: cover; }
        .close-btn { position: absolute; top: 40px; right: 20px; background: rgba(0,0,0,0.8); color: #fff; border: 1px solid #fff; padding: 8px 20px; border-radius: 8px; font-weight: 800; font-size: 11px; z-index: 10000; text-transform: uppercase; }
        
        .scan-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 400px; height: 150px; border: 2px solid var(--btn-bg); border-radius: 16px; z-index: 9999; box-shadow: 0 0 0 10000px rgba(0,0,0,0.75); }
        
        /* CẬP NHẬT THANH LASER CHẠY LÊN XUỐNG */
        .laser { 
            position: absolute; top: 0; left: 0; width: 100%; height: 2px; 
            background: var(--laser-color); 
            box-shadow: 0 0 15px 3px var(--laser-color); 
            animation: scanline 2.5s infinite ease-in-out; /* Dòng này đã được kích hoạt lại */
        }
        @keyframes scanline { 
            0%, 100% { transform: translateY(0); opacity: 0; } 
            10%, 90% { opacity: 1; } 
            50% { transform: translateY(148px); } 
        }
        
        .result-box { margin-top: 20px; background: var(--bg-input); padding: 15px; border-radius: 12px; border: 2px solid var(--btn-bg); display: none; }
        .result-link { color: var(--btn-bg); font-weight: 800; font-size: 18px; display: block; margin-top: 10px; text-decoration: none; text-transform: uppercase; }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div class="container">
    <div class="app-header">
        <h1>SOUNDCODE</h1>
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">GIAO DIỆN SÁNG</button>
    </div>

    <div class="section">
        <h2>1. Tạo mã Soundcode</h2>
        <input type="text" id="linkInput" placeholder="Dán link Facebook vào đây...">
        <br>
        <button class="btn-primary" onclick="generateSoundcode()">Mã hóa và Lưu</button>
        <button class="btn-primary" onclick="downloadCode()" id="dlBtn" style="display:none; background: #333; color: #fff;">Tải ảnh</button>
        <canvas id="encodeCanvas" width="550" height="150"></canvas>
    </div>

    <div class="section">
        <h2>2. Máy quét Soundcode</h2>
        <div id="dropZone" class="drop-zone">Kéo thả hoặc Bấm để chọn ảnh</div>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        
        <div id="previewContainer" style="display: none; margin-top: 15px;">
            <img id="previewImg" style="max-width: 60%; border-radius: 10px;">
            <br>
            <button class="btn-primary" id="startScanActionBtn" onclick="executeStaticScan()">Đọc ảnh</button>
        </div>

        <div style="margin: 20px 0; color: var(--text-muted); font-size: 10px; font-weight: 800; letter-spacing: 2px;">HOẶC</div>
        <button class="btn-primary" onclick="startCamera()">Quét trực tiếp</button>
        
        <div class="scanner-container" id="scannerContainer">
            <button class="close-btn" onclick="stopCamera()">Đóng</button>
            <video id="videoFeed" autoplay playsinline></video>
            <div class="scan-frame"><div class="laser"></div></div>
        </div>
        
        <canvas id="hiddenScanCanvas" style="display: none;"></canvas>
        <div class="result-box" id="decodeResult"><div id="linkContainer"></div></div>
    </div>
</div>

<script>
    function toggleTheme() {
        const body = document.body; const btn = document.getElementById('themeBtn');
        body.classList.toggle('light-mode');
        btn.innerText = body.classList.contains('light-mode') ? "GIAO DIỆN TỐI" : "GIAO DIỆN SÁNG";
        if(window.currentSecretId) drawBarcodeGraphics(window.currentSecretId);
    }

    const firebaseConfig = {
        apiKey: "AIzaSyAV09lR1qTD1BpcUDjXwzB-TCgjDt60jy8",
        authDomain: "soundcode-35412.firebaseapp.com",
        databaseURL: "https://soundcode-35412-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "soundcode-35412",
        storageBucket: "soundcode-35412.firebasestorage.app",
        messagingSenderId: "611646314484",
        appId: "1:611646314484:web:d9f0251c91c6ad6b680ba1"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    window.currentSecretId = null; 

    async function generateSoundcode() {
        const url = document.getElementById("linkInput").value.trim();
        const fbRegex = /(facebook\.com|fb\.com|fb\.watch)/;
        if (!url || !fbRegex.test(url.toLowerCase())) { alert("Link Facebook không hợp lệ!"); return; }
        try {
            const snap = await db.ref('soundCodes').orderByChild('url').equalTo(url).once('value');
            let id = snap.exists() ? Object.keys(snap.val())[0] : null;
            if (!id) {
                id = ""; for (let i = 0; i < 15; i++) id += Math.floor(Math.random() * 10);
                await db.ref('soundCodes/' + id).set({ url, createdAt: new Date().toISOString() });
            }
            window.currentSecretId = id; drawBarcodeGraphics(id);
        } catch (e) { alert("Lỗi kết nối!"); }
    }

    function drawBrandLogo(ctx, x, y, radius, color) {
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();

        ctx.fillStyle = "#FF9500";
        const barW = 5.2; 
        const gap = 6.8; 
        const bars = [14, 42, 22, 48, 30, 16]; 
        
        const totalW = (barW * bars.length) + (gap * (bars.length - 1));
        let startX = x - totalW / 2;
        
        bars.forEach(h => {
            ctx.beginPath();
            ctx.roundRect(startX, y - h/2, barW, h, 2);
            ctx.fill();
            startX += barW + gap;
        });
    }

    function drawBarcodeGraphics(id) {
        const canvas = document.getElementById("encodeCanvas"); const ctx = canvas.getContext("2d");
        const isLight = document.body.classList.contains('light-mode');
        const bgColor = isLight ? "#ffffff" : "#000000"; const fgColor = isLight ? "#000000" : "#ffffff";
        
        ctx.fillStyle = bgColor; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const cy = canvas.height/2; const logoX = 65; const logoRadius = 40;

        drawBrandLogo(ctx, logoX, cy, logoRadius, fgColor);

        ctx.fillStyle = fgColor; let startX = 145;
        for (let i = -1; i <= 15; i++) {
            let hR = (i === -1 || i === 15) ? 1.0 : (parseInt(id[i]) + 1) / 10;
            let h = 55 * hR; ctx.beginPath(); ctx.roundRect(startX, cy - h, 8, h * 2, 4); ctx.fill(); startX += 22;
        }
        canvas.style.display = "inline-block"; document.getElementById("dlBtn").style.display = "inline-block";
    }

    function downloadCode() {
        const link = document.createElement("a"); link.download = "Soundcode.png";
        link.href = document.getElementById("encodeCanvas").toDataURL(); link.click();
    }

    const dropZone = document.getElementById('dropZone'); const fileInput = document.getElementById('fileInput');
    const scanCanvas = document.getElementById('hiddenScanCanvas'); const scanCtx = scanCanvas.getContext('2d', { willReadFrequently: true });
    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => { if (e.target.files[0]) handleImageFile(e.target.files[0]); };
    function handleImageFile(file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                document.getElementById('previewImg').src = img.src;
                document.getElementById('previewContainer').style.display = "block";
                scanCanvas.width = img.width; scanCanvas.height = img.height;
                scanCtx.drawImage(img, 0, 0);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }
    function executeStaticScan() {
        document.getElementById('decodeResult').style.display = "block";
        document.getElementById('linkContainer').innerHTML = "Đang phân tích...";
        setTimeout(() => attemptDecode(true), 1000);
    }
    const video = document.getElementById('videoFeed'); let isScanning = false;
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } });
            video.srcObject = stream;
            document.getElementById('scannerContainer').style.display = "block";
            isScanning = true; requestAnimationFrame(scanLoop);
        } catch (e) { alert("Lỗi Camera!"); }
    }
    function stopCamera() {
        isScanning = false; if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('scannerContainer').style.display = "none";
    }
    function scanLoop() {
        if(!isScanning) return;
        if(video.videoWidth > 0) {
            scanCanvas.width = video.videoWidth; scanCanvas.height = video.videoHeight;
            scanCtx.drawImage(video, 0, 0); attemptDecode(false);
        }
        setTimeout(() => requestAnimationFrame(scanLoop), 200);
    }
    function attemptDecode(isStatic) {
        const data = scanCtx.getImageData(0, scanCanvas.height/2, scanCanvas.width, 1).data;
        let edge = 0; for(let i=0; i<10; i++) edge += (data[i*4] + data[i*4+1] + data[i*4+2]) / 3;
        const isWhite = (edge/10) > 127;
        let bars = []; let inB = false; let s = 0;
        for(let x=0; x<scanCanvas.width; x++) {
            let p = (data[x*4] + data[x*4+1] + data[x*4+2]) / 3;
            let isBar = isWhite ? (p < 100) : (p > 150);
            if(isBar && !inB) { inB=true; s=x; }
            else if(!isBar && inB) { inB=false; if(x-s>2) bars.push({s:s, e:x}); }
        }
        if(bars.length >= 17) {
            let bP = bars.slice(-17); let id = "";
            let refH = getH(Math.floor((bP[0].s+bP[0].e)/2), isWhite);
            for(let i=1; i<16; i++) {
                let h = getH(Math.floor((bP[i].s+bP[i].e)/2), isWhite);
                id += Math.max(0, Math.min(9, Math.round((h/refH)*10)-1));
            }
            checkDB(id, isStatic);
        } else if(isStatic) document.getElementById('linkContainer').innerHTML = "Không tìm thấy mã!";
    }
    function getH(x, isW) {
        const img = scanCtx.getImageData(x, 0, 1, scanCanvas.height).data;
        const m = scanCanvas.height/2; let h = 0;
        for(let y=m; y>=0; y--) { let p = (img[y*4]+img[y*4+1]+img[y*4+2])/3; if(isW ? p<100 : p>150) h++; else break; }
        for(let y=m+1; y<scanCanvas.height; y++) { let p = (img[y*4]+img[y*4+1]+img[y*4+2])/3; if(isW ? p<100 : p>150) h++; else break; }
        return h;
    }
    async function checkDB(id, isStatic) {
        try {
            const snap = await db.ref('soundCodes/'+id).once('value');
            if(snap.exists()) {
                stopCamera();
                document.getElementById("decodeResult").style.display = "block";
                document.getElementById('linkContainer').innerHTML = `
                    <p style="font-size:11px;color:var(--text-muted);text-transform:uppercase">Nhận diện thành công</p>
                    <a href="${snap.val().url}" target="_blank" class="result-link">Mở Facebook</a>
                `;
            }
        } catch (e) {}
    }
</script>
</body>
</html>
